<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#3B82F6" opacity="0.08"/>
  <circle cx="150" cy="530" r="150" fill="#6366F1" opacity="0.06"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="120" y="252" dominant-baseline="middle" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="42" fill="white">R</text>

  <!-- Brand name -->
  <text x="180" y="252" dominant-baseline="middle" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="48" fill="white">RecruitAI</text>

  <!-- Main title -->
  <text x="80" y="360" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="52" fill="white">AI로 취업 준비를 완성하세요</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="#94a3b8">이력서 · 자소서 · 경력기술서 · AI 면접 연습</text>

  <!-- CTA badge -->
  <rect x="80" y="470" width="240" height="50" rx="25" fill="url(#accent)"/>
  <text x="200" y="500" dominant-baseline="middle" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="22" fill="white">무료로 시작하기</text>

  <!-- URL -->
  <text x="80" y="580" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="20" fill="#64748b">www.recruitai.co.kr</text>
</svg>
